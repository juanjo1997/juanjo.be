name: drift-detection

on:
  schedule:
    # Mondays 13:00 UTC — a failed run means a stack no longer matches
    # its template and someone changed infrastructure outside GitOps.
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::221646756701:role/juanjo-be-gha-staging
          aws-region: us-east-1
      - name: Detect drift on every stack
        run: |
          set -euo pipefail

          # Runs one detection cycle and prints the stack's drift status.
          detect() {
            local id status
            id=$(aws cloudformation detect-stack-drift --stack-name "$1" \
              --query StackDriftDetectionId --output text)
            while :; do
              status=$(aws cloudformation describe-stack-drift-detection-status \
                --stack-drift-detection-id "$id" --query DetectionStatus --output text)
              [ "$status" = "DETECTION_IN_PROGRESS" ] || break
              sleep 5
            done
            aws cloudformation describe-stack-drift-detection-status \
              --stack-drift-detection-id "$id" --query StackDriftStatus --output text
          }

          FAILED=0
          for STACK in juanjo-be-bootstrap juanjo-be-dns-cert juanjo-be-site-staging juanjo-be-site-prod; do
            DRIFT=$(detect "$STACK")
            # A CloudFront distribution mid-propagation briefly reads as
            # drifted; re-check once after a pause so only persistent drift
            # (a real out-of-band change) fails the run.
            if [ "$DRIFT" != "IN_SYNC" ]; then
              sleep 90
              DRIFT=$(detect "$STACK")
            fi
            echo "$STACK: $DRIFT"
            if [ "$DRIFT" != "IN_SYNC" ]; then
              FAILED=1
              aws cloudformation describe-stack-resource-drifts --stack-name "$STACK" \
                --stack-resource-drift-status-filters MODIFIED DELETED \
                --query 'StackResourceDrifts[].[LogicalResourceId,StackResourceDriftStatus]' \
                --output text || true
            fi
          done
          exit $FAILED

name: pr-preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1
  ROLE_ARN: arn:aws:iam::221646756701:role/juanjo-be-gha-staging
  BUCKET: juanjo-be-staging

jobs:
  deploy:
    # Fork PRs can't assume the OIDC role (and shouldn't).
    if: >-
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
        working-directory: site
      - name: Build with PR base path
        run: npm run build
        working-directory: site
        env:
          BASE_PATH: /pr-${{ github.event.pull_request.number }}
          NEXT_PUBLIC_GIT_SHA: ${{ github.event.pull_request.head.sha }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Sync to staging prefix
        run: >-
          aws s3 sync site/out
          s3://${{ env.BUCKET }}/pr-${{ github.event.pull_request.number }}/
          --delete
      - name: Invalidate preview path
        run: |
          DIST_ID=$(aws cloudformation describe-stacks --stack-name juanjo-be-site-staging \
            --query 'Stacks[0].Outputs[?OutputKey==`DistributionId`].OutputValue' --output text)
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" \
            --paths "/pr-${{ github.event.pull_request.number }}/*"
      - name: Comment preview URL
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          URL="https://staging.juanjo.be/pr-${{ github.event.pull_request.number }}/"
          BODY="🔍 Preview deployed: $URL (commit ${{ github.event.pull_request.head.sha }})"
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} --edit-last --create-if-none --body "$BODY"

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::221646756701:role/juanjo-be-gha-staging
          aws-region: us-east-1
      - name: Remove preview prefix
        run: >-
          aws s3 rm
          s3://juanjo-be-staging/pr-${{ github.event.pull_request.number }}/
          --recursive

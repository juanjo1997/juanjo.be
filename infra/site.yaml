AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  One environment of the juanjo.be static site: private S3 bucket fronted by
  CloudFront via Origin Access Control, security headers, edge URL router,
  and DNS aliases. Deployed twice — staging (staging.juanjo.be) and prod
  (juanjo.be + www redirect).

Parameters:
  Environment:
    Type: String
    AllowedValues: [staging, prod]
  SiteDomain:
    Type: String
    Description: "Fully-qualified domain this environment serves (e.g. juanjo.be)"
  IncludeWww:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
  CertificateArn:
    Type: String
  RouterFunctionCode:
    Type: String
    Description: "Contents of infra/functions/router.js, injected at deploy time"

Conditions:
  WithWww: !Equals [!Ref IncludeWww, "true"]

Resources:
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub juanjo-be-${Environment}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      LifecycleConfiguration:
        Rules:
          - Id: abort-incomplete-uploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 3

  # Only this CloudFront distribution may read the bucket.
  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${SiteBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub juanjo-be-${Environment}-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # Rewrites directory URLs to index.html and canonicalizes hosts/slashes.
  RouterFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub juanjo-be-${Environment}-router
      AutoPublish: true
      FunctionConfig:
        Comment: "Directory index rewrite + canonical host/slash redirects"
        Runtime: cloudfront-js-2.0
      FunctionCode: !Ref RouterFunctionCode

  SecurityHeaders:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub juanjo-be-${Environment}-security-headers
        SecurityHeadersConfig:
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: true
            Preload: true
            Override: true
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          ContentSecurityPolicy:
            # 'unsafe-inline' script/style is required by Next.js static
            # export (no server means no per-request nonces).
            ContentSecurityPolicy: >-
              default-src 'self'; script-src 'self' 'unsafe-inline';
              style-src 'self' 'unsafe-inline'; img-src 'self' data:;
              font-src 'self'; object-src 'none'; base-uri 'self';
              frame-ancestors 'none'; form-action 'self'
            Override: true

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub juanjo.be ${Environment}
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        DefaultRootObject: index.html
        Aliases: !If
          - WithWww
          - [!Ref SiteDomain, !Sub "www.${SiteDomain}"]
          - [!Ref SiteDomain]
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: site-bucket
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !Ref OriginAccessControl
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: site-bucket
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          # AWS managed CachingOptimized policy.
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: !Ref SecurityHeaders
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt RouterFunction.FunctionMetadata.FunctionARN
        CustomErrorResponses:
          # S3 answers 403 for missing keys when listing is denied.
          - ErrorCode: 403
            ResponseCode: 404
            ResponsePagePath: /404.html
            ErrorCachingMinTTL: 60
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /404.html
            ErrorCachingMinTTL: 60

  DnsRecords:
    Type: AWS::Route53::RecordSetGroup
    Properties:
      HostedZoneId: !Ref HostedZoneId
      RecordSets:
        - Name: !Sub "${SiteDomain}."
          Type: A
          AliasTarget:
            # CloudFront's fixed global hosted zone id.
            HostedZoneId: Z2FDTNDATAQYW2
            DNSName: !GetAtt Distribution.DomainName
        - Name: !Sub "${SiteDomain}."
          Type: AAAA
          AliasTarget:
            HostedZoneId: Z2FDTNDATAQYW2
            DNSName: !GetAtt Distribution.DomainName
        - !If
          - WithWww
          - Name: !Sub "www.${SiteDomain}."
            Type: A
            AliasTarget:
              HostedZoneId: Z2FDTNDATAQYW2
              DNSName: !GetAtt Distribution.DomainName
          - !Ref AWS::NoValue
        - !If
          - WithWww
          - Name: !Sub "www.${SiteDomain}."
            Type: AAAA
            AliasTarget:
              HostedZoneId: Z2FDTNDATAQYW2
              DNSName: !GetAtt Distribution.DomainName
          - !Ref AWS::NoValue

Outputs:
  BucketName:
    Value: !Ref SiteBucket
  DistributionId:
    Value: !Ref Distribution
  DistributionDomain:
    Value: !GetAtt Distribution.DomainName
